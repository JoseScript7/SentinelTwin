<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <style>
    .bg{fill:#ffffff}
    .title{font:600 34px 'Segoe UI', Roboto, Arial;fill:#123a66}
    .muted{font:400 16px 'Segoe UI', Roboto, Arial;fill:#4b5563}
    .card{fill:#fbfdff;stroke:#eef3ff;stroke-width:1}
    .bar{fill:#3b82f6}
  </style>
  <rect class="bg" width="1200" height="800"/>
  <g transform="translate(60,60)">
    <text x="0" y="20" class="title">Inventory Forecast</text>
    <text x="0" y="48" class="muted">Projected availability and demand</text>

    <rect x="0" y="80" width="1080" height="600" rx="10" class="card"/>
    <g transform="translate(36,120)">
      <!-- spark bars -->
      <g transform="translate(0,0)">
        <rect x="0" y="0" width="24" height="160" fill="#e6eefc" rx="6"/>
        <rect x="48" y="40" width="24" height="120" class="bar" rx="6"/>
        <rect x="96" y="20" width="24" height="140" fill="#60a5fa" rx="6"/>
        <rect x="144" y="80" width="24" height="80" fill="#93c5fd" rx="6"/>
      </g>
      <text x="0" y="210" class="muted">Time →</text>

      <!-- legend -->
      <g transform="translate(360,0)">
        <rect width="220" height="80" rx="8" fill="#fff" stroke="#eef3ff"/>
        <text x="16" y="28" class="muted">Inventory</text>
        <text x="16" y="54" class="muted">Forecast</text>
      </g>
    </g>
  </g>
</svg>